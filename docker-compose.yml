services:
  master:
    build:
      context: .
      dockerfile: Dockerfile.master
    container_name: cuttlefish-master
    ports:
      - "8080:8080"
    environment:
      MASTER_ADDR: ":8080"
      MASTER_TOKEN: "${MASTER_TOKEN:-change-me-in-production}"
    networks:
      - cuttlefish

  slave:
    build:
      context: .
      dockerfile: Dockerfile.slave
    container_name: cuttlefish-slave
    network_mode: host
    environment:
      SLAVE_ID: "local-slave"
      SLAVE_NAME: "Local Test Slave"
      SLAVE_PUBLIC_URL: "http://localhost:8080"
      MASTER_URL: "http://localhost:8080"
      SLAVE_TOKEN: "${MASTER_TOKEN:-change-me-in-production}"
      SLAVE_LOCATION: "Docker local"
      SLAVE_ADDR: ":8080"
      IPERF_PORT: "5201"
      FILES_DIR: "/data/files"
      # Optional: limit test file sizes, e.g. "1M,10M,100M,1G"
      FILES_SIZES: "${FILES_SIZES:-}"
      # Optional: interfaces to monitor for traffic charts, e.g. "eth0,ens18"
      STATS_INTERFACES: "${STATS_INTERFACES:-}"
    cap_add:
      - NET_RAW
    depends_on:
      - master

networks:
  cuttlefish:
    driver: bridge
